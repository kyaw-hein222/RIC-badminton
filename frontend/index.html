<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIC_Badminton</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #0f111a;      /* Warm deep navy bg — dark but not black-hole */
      --secondary: #1a1d2e;    /* Rich elevated surface */
      --accent: #ff6b6b;       /* Warm coral — vibrant, sporty, easy on eyes */
      --accent-glow: rgba(255, 107, 107, 0.3);
      --neon-blue: #4ecdc4;    /* Fresh teal — crisp but not harsh */
      --neon-blue-glow: rgba(78, 205, 196, 0.25);
      --success: #2ecc71;      /* Vibrant green */
      --success-glow: rgba(46, 204, 113, 0.2);
      --warning: #f39c12;      /* Warm amber */
      --white: #ffffff;
      --text-main: #f0f0f5;    /* Soft warm white */
      --text-muted: #8e8ea0;   /* Warmer muted gray */
      --border: rgba(255, 255, 255, 0.06); /* Subtle glass border */
      --shadow: 0 10px 30px -8px rgba(0, 0, 0, 0.8);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: "Outfit", "Inter", sans-serif;
      background: var(--primary);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 107, 107, 0.08) 0%, rgba(78, 205, 196, 0.05) 50%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    /* HEADER */
    header {
      background: rgba(26, 29, 46, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      transition: transform 0.2s ease;
    }
    
    .header-left:hover {
      transform: translateY(-1px);
    }
    
    .header-logo {
      filter: drop-shadow(0 0 6px var(--accent-glow));
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    .header-left:hover .header-logo {
      filter: drop-shadow(0 0 10px var(--neon-blue-glow));
      transform: rotate(10deg);
    }
    
    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--white) 30%, #a0a0b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.25s ease;
    }

    .header-left:hover h1 {
      background: linear-gradient(135deg, var(--neon-blue) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .refresh-btn {
      background: rgba(78, 205, 196, 0.08);
      color: var(--neon-blue);
      border: 1px solid rgba(78, 205, 196, 0.2);
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.05);
    }

    .refresh-btn:hover {
      background: var(--neon-blue);
      color: var(--primary);
      box-shadow: 0 4px 15px var(--neon-blue-glow);
      transform: translateY(-1px);
    }

    .refresh-btn:active {
      transform: translateY(1px);
    }

    .refresh-icon {
      font-size: 0.95rem;
      display: inline-block;
      transition: transform 0.5s ease-in-out;
      color: inherit;
    }
    
    .refresh-btn:hover .refresh-icon {
      transform: rotate(360deg);
    }
    
    header a.admin-btn {
      background: rgba(255, 107, 107, 0.1);
      color: var(--accent);
      border: 1px solid rgba(255, 107, 107, 0.3);
      text-decoration: none;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    header a.admin-btn:hover {
      background: var(--accent);
      color: var(--white);
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-1px);
    }

    /* MAIN CONTENT */
    main {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 80px;
      flex: 1;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin: 32px 0 16px 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, transparent 100%);
      margin-left: 12px;
    }
    
    .section-label.ongoing-label {
      color: var(--success);
      text-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
    }

    /* MATCH CARD */
    .match-card {
      background: var(--secondary);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px 24px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    
    .match-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: transparent;
      transition: background 0.3s;
    }
    
    .match-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.9);
    }
    
    .match-card.ongoing {
      background: linear-gradient(135deg, #1a1d2e 0%, rgba(46, 204, 113, 0.03) 100%);
      border-color: rgba(46, 204, 113, 0.25);
    }
    
    .match-card.ongoing::before {
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
    }

    /* MATCH META (Court & Date) */
    .match-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      min-width: 85px;
    }

    .court-badge {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      font-size: 0.72rem;
      font-weight: 800;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    
    .match-card.ongoing .court-badge {
      background: rgba(46, 204, 113, 0.1);
      color: #34d399;
      border-color: rgba(46, 204, 113, 0.3);
      box-shadow: 0 0 8px rgba(46, 204, 113, 0.1);
    }

    .match-date-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      text-align: center;
      width: 100%;
    }

    /* PLAYERS LAYOUT */
    .players {
      flex: 1;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .team-block {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 6px 12px;
      border-radius: 8px;
      color: #e2e8f0;
    }
    
    .match-card.ongoing .team-block {
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
    }
    
    .vs {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.2);
      padding: 3px 6px;
      border-radius: 4px;
      font-family: "Inter", sans-serif;
    }

    /* LIVE & TIME STATUS */
    .status-ongoing-text {
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--success);
      background: rgba(46, 204, 113, 0.12);
      border: 1px solid rgba(46, 204, 113, 0.2);
      padding: 6px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.5px;
      box-shadow: 0 0 10px rgba(46, 204, 113, 0.05);
    }
    
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.6s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.85); }
    }
    
    .queue-num {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 700;
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* AVATARS */
    .avatar {
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      object-fit: cover;
      flex-shrink: 0;
    }
    
    .avatar-initials {
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    
    .avatar.sm, .avatar-initials.sm {
      width: 32px; height: 32px;
      font-size: 0.8rem;
    }
    
    .avatar.md, .avatar-initials.md {
      width: 40px; height: 40px;
      font-size: 1rem;
    }

    /* EMPTY STATES */
    .empty {
      text-align: center;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .empty-icon {
      font-size: 2.2rem;
      margin-bottom: 10px;
      filter: grayscale(0.5) opacity(0.7);
    }
    
    .empty h3 {
      font-size: 1rem;
      margin-bottom: 4px;
      color: var(--text-main);
      font-weight: 600;
    }
    
    .empty p { font-size: 0.85rem; }

    /* PLAYER LIST QUEUE */
    .player-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    
    .player-chip {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .player-chip:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 107, 107, 0.2);
      box-shadow: 0 8px 24px -10px rgba(0,0,0,0.8);
    }
    
    .player-chip small {
      display: block;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    
    .shuttle-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(78, 205, 196, 0.06);
      color: #38bdf8;
      border: 1px solid rgba(78, 205, 196, 0.12);
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
      font-weight: 700;
    }
    
    .stat-none {
      color: var(--text-muted);
      font-style: italic;
      font-weight: 400;
    }

    /* FOOTER BAR WITH RECORDS NAVIGATION */
    .footer-bar {
      text-align: center;
      padding: 32px 16px;
      border-top: 1px solid var(--border);
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    
    .last-updated-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    #last-updated {
      color: var(--text-main);
      font-weight: 600;
    }

    .records-link-btn {
      background: linear-gradient(135deg, var(--accent) 0%, #b31940 100%);
      color: var(--white);
      border: none;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: var(--radius);
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .records-link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 107, 107, 0.5);
      background: linear-gradient(135deg, #ff4c7b 0%, var(--accent) 100%);
    }

    .records-link-btn:active {
      transform: translateY(1px);
    }
</style>
</head>
<body>

<header>
  <a href="index.html" class="header-left">
    <!-- Sleek premium RIC_Badminton SVG Logo -->
    <svg width="36" height="36" viewBox="0 0 100 100" class="header-logo" style="display: block;">
      <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4ecdc4" />
          <stop offset="100%" stop-color="#ff6b6b" />
        </linearGradient>
      </defs>
      <!-- Outer glow circle ring -->
      <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGrad)" stroke-width="5" />
      
      <!-- Detailed Premium Feather Shuttlecock -->
      <g stroke="url(#logoGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
        <!-- Cork base -->
        <path d="M40 54 C40 66, 60 66, 60 54 Z" fill="url(#logoGrad)" opacity="0.8" />
        <path d="M40 54 Q50 57 60 54" stroke="#ffffff" stroke-width="1.5" />
        
        <!-- Scalloped Feather Tips -->
        <path d="M30 25 C32 20, 38 20, 38 25" />
        <path d="M38 25 C40 20, 46 20, 46 25" />
        <path d="M46 25 C48 20, 54 20, 54 25" />
        <path d="M54 25 C56 20, 62 20, 62 25" />
        <path d="M62 25 C64 20, 70 20, 70 25" />
        
        <!-- Outer Edges -->
        <path d="M30 25 L40 54" />
        <path d="M70 25 L60 54" />
        
        <!-- Feather shafts (radiating shafts) -->
        <line x1="38" y1="25" x2="44" y2="54" />

        <line x1="54" y1="25" x2="52" y2="54" />
        <line x1="62" y1="25" x2="56" y2="54" />
        
        <!-- Two sewing threads binding the feathers -->
        <path d="M34 36 Q50 40 66 36" stroke-width="2" />
        <path d="M37 45 Q50 48 63 45" stroke-width="2" />
      </g>
      
      <!-- Bold "RIC" Text in center-bottom -->
      <text x="50" y="86" font-family="'Outfit', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">RIC</text>
    </svg>
    <h1>RIC_Badminton</h1>
  </a>
  <div class="header-right">
    <button class="refresh-btn" onclick="renderMatches(true)">
      <span class="refresh-icon">🔄</span> Refresh Board
    </button>
    <a href="admin.html" class="admin-btn">⚙️ Admin</a>
  </div>
</header>

<main>
  <div class="section-label ongoing-label">🔥 Today's Ongoing Matches</div>
  <div id="ongoing-container"></div>

  <div class="section-label">📋 Today's Upcoming Queue</div>
  <div id="upcoming-container"></div>

  <div class="section-label">👤 Today's Checked-In Roster / Stats</div>
  <div id="players-container"></div>

  <div class="footer-bar">
    <div class="last-updated-text">
      Last updated: <span id="last-updated">-</span>
    </div>
    
    <!-- NAVIGATION TO RECORDS "OTHER SIDE" -->
    <a href="records.html" class="records-link-btn">
      🏆 View Club Records & Match History
    </a>
  </div>
</main>

<script>
const LS_KEY = "badmin_queue";
const PLAYERS_KEY = "badmin_players";
const API_URL = ""; // Paste API Gateway invoke URL after backend deployment.
const CLOUD_KEYS = [LS_KEY, PLAYERS_KEY];
let cloudState = null;

function apiStateEndpoint() {
  return API_URL ? `${API_URL.replace(/\/$/, "")}/state` : "";
}

function readLocalState() {
  return {
    [LS_KEY]: JSON.parse(localStorage.getItem(LS_KEY) || "[]"),
    [PLAYERS_KEY]: JSON.parse(localStorage.getItem(PLAYERS_KEY) || "[]")
  };
}

async function loadCloudState() {
  const endpoint = apiStateEndpoint();
  if (!endpoint) {
    cloudState = readLocalState();
    return;
  }

  try {
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error(`API returned ${res.status}`);
    const data = await res.json();
    cloudState = Object.fromEntries(CLOUD_KEYS.map(key => [key, Array.isArray(data[key]) ? data[key] : []]));
    CLOUD_KEYS.forEach(key => localStorage.setItem(key, JSON.stringify(cloudState[key])));
  } catch (err) {
    console.error("Failed to load AWS state; using local backup.", err);
    cloudState = readLocalState();
  }
}

function getStateArray(key) {
  if (!cloudState) cloudState = readLocalState();
  return cloudState[key] || [];
}

function loadMatches() {
  return getStateArray(LS_KEY);
}

function loadPlayers() {
  const players = getStateArray(PLAYERS_KEY);
  return players.map((p, i) => ({ ...p, order: p.order ?? i + 1, matchesPlayed: p.matchesPlayed ?? 0 }));
}

function shuttleIcons(count) {
  const total = Number(count) || 0;
  if (total === 0) return `<span class="stat-none">0 games today</span>`;
  let sh = "";
  if (total <= 3) {
    sh = "🏸".repeat(total);
  } else {
    sh = `🏸 x${total}`;
  }
  return `<span class="shuttle-badge">${sh}</span>`;
}

// Generate Player Avatar HTML
function getPlayerAvatarHtml(p, sizeClass = "sm") {
  if (p.avatar) {
    return `<img src="${p.avatar}" class="avatar ${sizeClass}" alt="${p.name}" />`;
  }
  const initials = p.name ? p.name.charAt(0).toUpperCase() : "?";
  let hash = 0;
  for (let i = 0; i < p.name.length; i++) {
    hash = p.name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash % 360);
  const gradient = `linear-gradient(135deg, hsl(${hue}, 80%, 55%) 0%, hsl(${(hue + 45) % 360}, 80%, 40%) 100%)`;
  return `<div class="avatar-initials ${sizeClass}" style="background: ${gradient};">${initials}</div>`;
}

// Generate Player Rank Badge HTML
function getRankBadgeHtml(rank) {
  const r = (rank || "B").toUpperCase();
  let gradient = "";
  let textColor = "#ffffff";
  switch (r) {
    case "S":
      gradient = "linear-gradient(135deg, #ff4d4d, #b30000)";
      break;
    case "A":
      gradient = "linear-gradient(135deg, #ffb300, #ff8000)";
      break;
    case "B":
      gradient = "linear-gradient(135deg, #00d2ff, #0066ff)";
      break;
    case "C":
      gradient = "linear-gradient(135deg, #00ff87, #00b359)";
      textColor = "#0f111a";
      break;
    case "D":
      gradient = "linear-gradient(135deg, #d946ef, #8b5cf6)";
      break;
    default:
      gradient = "linear-gradient(135deg, #a0a0b8, #8e8ea0)";
  }
  return `<span class="rank-badge" style="background: ${gradient}; color: ${textColor}; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); vertical-align: middle;">${r}</span>`;
}

function getElapsedMinutes(startTime) {
  if (!startTime) return "";
  const elapsedMs = Date.now() - startTime;
  const elapsedMins = Math.max(0, Math.floor(elapsedMs / 60000));
  return elapsedMins + "m";
}

async function renderMatches(isManualClick = false) {
  if (!cloudState || isManualClick) await loadCloudState();
  const matches = loadMatches();

  const ongoing = matches
    .filter(m => m.status === "ongoing")
    .sort((a, b) => a.order - b.order);

  const upcoming = matches
    .filter(m => m.status === "upcoming")
    .sort((a, b) => a.order - b.order);

  const ongoingEl = document.getElementById("ongoing-container");
  const upcomingEl = document.getElementById("upcoming-container");

  if (ongoing.length === 0) {
    ongoingEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💤</div>
        <h3>No ongoing matches</h3>
        <p>All courts are currently free.</p>
      </div>`;
  } else {
    ongoingEl.innerHTML = ongoing.map(m => {
      const elapsed = m.startTime ? getElapsedMinutes(m.startTime) : "";
      const displayTime = elapsed ? `LIVE • ${elapsed}` : "LIVE";
      const dateBadge = m.date ? `<div class="match-date-badge">${m.date}</div>` : "";
      
      return `
        <div class="match-card ongoing">
          <div class="match-meta">
            <div class="court-badge">${m.court}</div>
            ${dateBadge}
          </div>
          <div class="players">
            <span class="team-block">${m.team1a} / ${m.team1b}</span>
            <span class="vs">VS</span>
            <span class="team-block">${m.team2a} / ${m.team2b}</span>
          </div>
          <span class="status-ongoing-text"><span class="status-dot"></span> ${displayTime}</span>
        </div>`;
    }).join("");
  }

  if (upcoming.length === 0) {
    upcomingEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <h3>Queue is empty</h3>
        <p>No upcoming matches scheduled.</p>
      </div>`;
  } else {
    upcomingEl.innerHTML = upcoming.map((m, i) => {
      const dateBadge = m.date ? `<div class="match-date-badge">${m.date}</div>` : "";
      return `
        <div class="match-card">
          <div class="match-meta">
            <div class="court-badge">${m.court}</div>
            ${dateBadge}
          </div>
          <div class="players">
            <span class="team-block">${m.team1a} / ${m.team1b}</span>
            <span class="vs">VS</span>
            <span class="team-block">${m.team2a} / ${m.team2b}</span>
          </div>
          <span class="queue-num">#${i + 1}</span>
        </div>`;
    }).join("");
  }

  const players = loadPlayers().sort((a, b) => a.order - b.order);
  const playersEl = document.getElementById("players-container");

  if (players.length === 0) {
    playersEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">👤</div>
        <h3>No active checked-in players</h3>
        <p>Admin will check in players in the admin console to start the session.</p>
      </div>`;
  } else {
    playersEl.innerHTML = `<div class="player-list">${players.map(p => `
      <div class="player-chip">
        <div style="display: flex; align-items: center; gap: 12px;">
          ${getPlayerAvatarHtml(p, "sm")}
          <div style="display: flex; flex-direction: column; min-width: 0;">
            <span style="font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p.name}${getRankBadgeHtml(p.rank)}</span>
            <small>${shuttleIcons(p.matchesPlayed)}</small>
          </div>
        </div>
      </div>`).join("")}</div>`;
  }

  document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();

  if (isManualClick) {
    const icon = document.querySelector(".refresh-icon");
    if (icon) {
      icon.style.transform = "rotate(360deg)";
      setTimeout(() => { icon.style.transform = "none"; }, 500);
    }
  }
}

// Initial render only - no auto refresh interval, fully manual!
renderMatches();
</script>
</body>
</html>
